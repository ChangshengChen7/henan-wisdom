name: Android CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7

    - name: Build Debug APK
      id: build
      run: |
        ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log
        echo "build_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Notify Success
      if: success()
      env:
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
          -F "chat_id=${TG_CHAT_ID}" \
          -F "text=вң… жҷәж…§жІіеҚ—зј–иҜ‘жҲҗеҠҹпјҒ%0A%0Aрҹ“Ұ дёӢиҪҪ: https://github.com/ChangshengChen7/henan-wisdom/actions/runs/${GITHUB_RUN_ID}%0A%0Aрҹ’• зәўиҺІ"

    - name: Notify Failure
      if: failure()
      env:
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        # жҸҗеҸ–й”ҷиҜҜдҝЎжҒҜ
        ERRORS=$(grep -E "^e:" build.log | head -10 || echo "жҹҘзңӢе®Ңж•ҙж—Ҙеҝ—")
        curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
          -F "chat_id=${TG_CHAT_ID}" \
          -F "text=вқҢ жҷәж…§жІіеҚ—зј–иҜ‘еӨұиҙҘпјҒ%0A%0Aй”ҷиҜҜж‘ҳиҰҒ:%0A${ERRORS}%0A%0Aрҹ“Ӯ ж—Ҙеҝ—: https://github.com/ChangshengChen7/henan-wisdom/actions/runs/${GITHUB_RUN_ID}%0A%0Aрҹ’• зәўиҺІ"
